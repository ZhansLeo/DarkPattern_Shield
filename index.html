<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DarkPattern Shield - 套路终结者</title>
  <style>
    /* ==================== iOS 18 设计系统变量 ==================== */
    :root {
      /* 核心色谱 */
      --neutral-dark: #7f8c8d;
      --bright-blue: #1e90ff;
      --safe-green: #2ecc71;
      --bg-dark: #1a1a1a;
      --bg-light: #f5f5f7;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --glass-bg: rgba(255, 255, 255, 0.72);
      --glass-border: rgba(255, 255, 255, 0.18);

      /* 动画时长 */
      --transition-speed: 300ms;
      --scan-duration: 1000ms;
      --pulse-duration: 2000ms;

      /* 动画缓动函数 */
      --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
      --bounce-ease: cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    /* ==================== 基础重置 ==================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ==================== iPhone 容器 ==================== */
    .iphone-container {
      width: 375px;
      height: 812px;
      background: var(--bg-dark);
      border-radius: 50px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 50px 100px rgba(0, 0, 0, 0.4),
        0 0 0 12px #2d2d2d,
        0 0 0 14px #1a1a1a;
    }

    /* 灵动岛刘海屏 */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #000;
      border-radius: 20px;
      z-index: 1000;
      transition: all var(--transition-speed) var(--ease-in-out);
    }

    /* 前置摄像头 */
    .dynamic-island::before {
      content: '';
      position: absolute;
      top: 10px;
      right: 20px;
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, #1a1a2e 40%, #0a0a0f 100%);
      border-radius: 50%;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
    }

    /* 状态栏时间 */
    .status-bar {
      position: absolute;
      top: 14px;
      left: 40px;
      right: 40px;
      display: flex;
      justify-content: space-between;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
    }

    /* 屏幕内容区域 */
    .screen-content {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* ==================== 悬浮盾 ==================== */
    .shield-ball {
      position: absolute;
      right: -30px;
      top: 50%;
      transform: translateY(-50%);
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--bright-blue) 0%, #00d4ff 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow:
        0 8px 32px rgba(30, 144, 255, 0.4),
        inset 0 2px 4px rgba(255, 255, 255, 0.3);
      transition:
        transform var(--transition-speed) var(--ease-in-out),
        box-shadow var(--transition-speed) var(--ease-in-out);
      z-index: 999;
      opacity: 0;
    }

    /* 盾牌图标 */
    .shield-icon {
      width: 32px;
      height: 32px;
      fill: #fff;
    }

    /* 悬浮盾 - 警报状态 */
    .shield-ball.alerting {
      right: 15px;
      opacity: 1;
      animation: shield-pulse var(--pulse-duration) var(--ease-in-out) infinite;
    }

    /* 悬浮盾 - 净化状态 */
    .shield-ball.purified {
      right: 15px;
      opacity: 1;
      background: linear-gradient(135deg, var(--safe-green) 0%, #27ae60 100%);
    }

    /* 呼吸光晕动画 */
    @keyframes shield-pulse {
      0%, 100% {
        box-shadow:
          0 8px 32px rgba(30, 144, 255, 0.4),
          inset 0 2px 4px rgba(255, 255, 255, 0.3);
      }
      50% {
        box-shadow:
          0 8px 48px rgba(30, 144, 255, 0.7),
          0 0 60px rgba(30, 144, 255, 0.3),
          inset 0 2px 4px rgba(255, 255, 255, 0.3);
      }
    }

    /* ==================== 底部抽屉 ==================== */
    /* 遮罩层 */
    .sheet-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      visibility: hidden;
      transition: all var(--transition-speed) var(--ease-in-out);
      z-index: 997;
    }

    .sheet-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 280px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      border-radius: 24px 24px 0 0;
      transform: translateY(100%);
      transition: transform 400ms var(--bounce-ease);
      z-index: 998;
      padding: 24px;
    }

    .bottom-sheet.open {
      transform: translateY(0);
    }

    /* 抽屉把手 */
    .sheet-handle {
      width: 36px;
      height: 5px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
      margin: 0 auto 20px;
    }

    /* 扫描日志区域 */
    .scan-log {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      min-height: 48px;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 13px;
      color: var(--neutral-dark);
      line-height: 1.5;
    }

    .scan-log .ai-tag {
      color: var(--bright-blue);
      font-weight: 600;
    }

    /* 净化/引导按钮 */
    .action-button {
      width: 100%;
      height: 56px;
      background: linear-gradient(135deg, var(--safe-green) 0%, #27ae60 100%);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-speed) var(--ease-in-out);
      box-shadow: 0 8px 24px rgba(46, 204, 113, 0.3);
    }

    .action-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(46, 204, 113, 0.4);
    }

    .action-button:active {
      transform: translateY(0);
    }

    /* ==================== 页面容器 ==================== */
    .page {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background: var(--bg-light);
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--transition-speed) var(--ease-in-out);
      overflow-y: auto;
      padding-top: 60px;
    }

    .page.active {
      opacity: 1;
      visibility: visible;
    }

    /* 开屏广告页特殊处理 */
    .page#ad-stage {
      background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
      padding-top: 0;
    }

    /* ==================== 开屏广告页内容 ==================== */
    .ad-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* 广告Logo */
    .ad-logo {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    /* 广告文案 */
    .ad-slogan {
      font-size: 18px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 40px;
      text-align: center;
      padding: 0 30px;
    }

    /* 假关闭按钮（诱饵） */
    .decoy-close-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.95);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      transition: all var(--transition-speed) var(--ease-in-out);
    }

    .decoy-close-btn .x-icon {
      font-size: 48px;
      font-weight: 300;
      color: #e74c3c;
    }

    /* 假按钮净化后的样式 */
    .decoy-close-btn.purified {
      opacity: 0.2;
      filter: grayscale(100%);
      pointer-events: none;
    }

    /* 诱饵标签 */
    .decoy-label {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity var(--transition-speed);
    }

    .decoy-close-btn.purified .decoy-label {
      opacity: 1;
    }

    /* 真跳过按钮 */
    .real-skip-btn {
      position: absolute;
      top: 60px;
      right: 20px;
      font-size: 5px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all var(--transition-speed) var(--ease-in-out);
      padding: 4px 8px;
      border-radius: 4px;
    }

    /* 真按钮净化后的样式 */
    .real-skip-btn.purified {
      font-size: 16px;
      color: #fff;
      font-weight: 600;
      background: rgba(30, 144, 255, 0.2);
      padding: 8px 16px;
    }

    /* AI推荐标记 */
    .ai-recommend-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity var(--transition-speed);
      font-size: 10px;
    }

    .real-skip-btn.purified .ai-recommend-badge {
      opacity: 1;
    }

    .ai-recommend-badge svg {
      width: 14px;
      height: 14px;
      fill: var(--bright-blue);
      animation: badge-pulse 1s var(--ease-in-out) infinite;
    }

    @keyframes badge-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* 调试信息面板 */
    .debug-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: #0f0;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 12px;
      z-index: 9999;
    }

    .debug-panel .label {
      color: #888;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <!-- 主容器 -->
  <div class="iphone-container">
    <!-- 灵动岛 -->
    <div class="dynamic-island"></div>

    <!-- 状态栏 -->
    <div class="status-bar">
      <span>9:41</span>
      <span>
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor">
          <rect x="0" y="1" width="3" height="4" rx="0.5"/>
          <rect x="4" y="0" width="14" height="12" rx="2"/>
        </svg>
      </span>
    </div>

    <!-- 屏幕内容 -->
    <div class="screen-content">
      <!-- 开屏广告页 -->
      <div id="ad-stage" class="page">
        <div class="ad-content">
          <div class="ad-logo">STREAM+</div>
          <div class="ad-slogan">海量视频 · 无限畅看<br>新用户首月仅需 1 元</div>

          <!-- 假关闭按钮（诱饵） -->
          <div id="decoy-close-btn" class="decoy-close-btn" data-pattern="decoy-button">
            <span class="x-icon">×</span>
            <div class="decoy-label">ⓘ 诱饵</div>
          </div>

          <!-- 真跳过按钮 -->
          <div id="real-skip-btn" class="real-skip-btn" data-pattern="real-skip">
            跳过
            <span class="ai-recommend-badge">
              <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
              AI推荐
            </span>
          </div>
        </div>
      </div>

      <!-- 首页 -->
      <div id="home-stage" class="page"></div>

      <!-- VIP购买页 -->
      <div id="vip-stage" class="page"></div>

      <!-- 订阅管理页 -->
      <div id="unsub-stage" class="page"></div>
    </div>

    <!-- 悬浮盾 -->
    <div class="shield-ball" id="shield-ball">
      <svg class="shield-icon" viewBox="0 0 24 24">
        <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V8.14l7-3.89v8.74z"/>
      </svg>
    </div>

    <!-- 遮罩层 -->
    <div class="sheet-overlay" id="sheet-overlay"></div>

    <!-- 底部抽屉 -->
    <div class="bottom-sheet" id="bottom-sheet">
      <div class="sheet-handle"></div>
      <div class="scan-log" id="scan-log">
        <span class="ai-tag">[AI]</span> 等待扫描...
      </div>
      <button class="action-button" id="action-button">一键净化</button>
    </div>
  </div>

  <!-- 调试面板（开发阶段使用） -->
  <div class="debug-panel" id="debug-panel">
    <div><span class="label">Stage:</span><span id="debug-stage">AD_STAGE</span></div>
    <div><span class="label">Shield:</span><span id="debug-shield">HIDDEN</span></div>
  </div>

  <script>
    // ==================== 全局状态管理器 ====================
    const simulationState = {
      // 当前演示场景
      currentStage: "AD_STAGE",  // "AD_STAGE" | "HOME_STAGE" | "VIP_STAGE" | "UNSUB_STAGE"

      // 悬浮盾状态
      shieldState: "HIDDEN",      // "HIDDEN" | "ALERTING" | "PURIFIED"

      // AI 扫描动效状态
      scanLogActive: false,

      // 用户操作状态
      isVipPurchased: false,
      isAutoRenewCancelled: false,

      // 动画是否在进行中（防止重复触发）
      isAnimating: false
    };

    // ==================== DOM 元素获取 ====================
    const elements = {
      // 页面
      pages: {
        adStage: document.getElementById('ad-stage'),
        homeStage: document.getElementById('home-stage'),
        vipStage: document.getElementById('vip-stage'),
        unsubStage: document.getElementById('unsub-stage')
      },

      // 交互组件
      shieldBall: document.getElementById('shield-ball'),
      sheetOverlay: document.getElementById('sheet-overlay'),
      bottomSheet: document.getElementById('bottom-sheet'),
      scanLog: document.getElementById('scan-log'),
      actionButton: document.getElementById('action-button'),

      // 调试面板
      debugPanel: document.getElementById('debug-panel'),
      debugStage: document.getElementById('debug-stage'),
      debugShield: document.getElementById('debug-shield')
    };

    // ==================== 状态更新与调试信息 ====================
    function updateDebugPanel() {
      elements.debugStage.textContent = simulationState.currentStage;
      elements.debugShield.textContent = simulationState.shieldState;
    }

    // ==================== 页面切换函数 ====================
    function switchPage(stageName) {
      // 隐藏所有页面
      Object.values(elements.pages).forEach(page => {
        page.classList.remove('active');
      });

      // 显示目标页面
      const pageMap = {
        'AD_STAGE': 'adStage',
        'HOME_STAGE': 'homeStage',
        'VIP_STAGE': 'vipStage',
        'UNSUB_STAGE': 'unsubStage'
      };

      const targetPage = elements.pages[pageMap[stageName]];
      if (targetPage) {
        targetPage.classList.add('active');
      }

      // 更新状态
      simulationState.currentStage = stageName;
      updateDebugPanel();
    }

    // ==================== 悬浮盾状态管理 ====================
    function setShieldState(state) {
      const shield = elements.shieldBall;

      // 移除所有状态类
      shield.classList.remove('alerting', 'purified');

      // 应用新状态
      switch (state) {
        case 'ALERTING':
          shield.classList.add('alerting');
          break;
        case 'PURIFIED':
          shield.classList.add('purified');
          break;
        case 'HIDDEN':
          // 已移除所有类
          break;
      }

      simulationState.shieldState = state;
      updateDebugPanel();
    }

    // ==================== 抽屉控制 ====================
    function openBottomSheet() {
      elements.sheetOverlay.classList.add('open');
      elements.bottomSheet.classList.add('open');
    }

    function closeBottomSheet() {
      elements.sheetOverlay.classList.remove('open');
      elements.bottomSheet.classList.remove('open');
      // 重置扫描日志
      elements.scanLog.innerHTML = '<span class="ai-tag">[AI]</span> 等待扫描...';
    }

    // ==================== AI 扫描打字机动效 ====================
    function playScanLog(text, callback) {
      if (simulationState.scanLogActive) return;

      simulationState.scanLogActive = true;
      const logElement = elements.scanLog;
      logElement.innerHTML = '<span class="ai-tag">[AI]</span> ';

      const fullText = text;
      let index = 0;
      const charsPerFrame = Math.ceil(fullText.length / 50); // 约20fps完成1秒动画
      const frameInterval = 20;

      const interval = setInterval(() => {
        const chunk = fullText.substring(0, index + charsPerFrame);
        logElement.innerHTML = `<span class="ai-tag">[AI]</span> ${chunk}`;
        index += charsPerFrame;

        if (index >= fullText.length) {
          clearInterval(interval);
          simulationState.scanLogActive = false;
          if (callback) callback();
        }
      }, frameInterval);
    }

    // ==================== 阶段二：开屏广告场景逻辑 ====================

    // 开屏广告页元素
    const adElements = {
      decoyBtn: document.getElementById('decoy-close-btn'),
      realSkipBtn: document.getElementById('real-skip-btn')
    };

    // 页面加载后触发悬浮盾出现（2秒延迟）
    function triggerAdStageShield() {
      setTimeout(() => {
        setShieldState('ALERTING');
      }, 2000);
    }

    // 悬浮盾点击事件
    elements.shieldBall.addEventListener('click', () => {
      if (simulationState.isAnimating) return;

      openBottomSheet();

      // 根据当前阶段显示不同的扫描日志
      if (simulationState.currentStage === 'AD_STAGE') {
        playScanLog('识别到1处诱导下载广告...', () => {
          // 扫描完成后，准备执行净化
          elements.actionButton.onclick = () => purifyAdStage();
        });
      }
    });

    // 点击遮罩层关闭抽屉
    elements.sheetOverlay.addEventListener('click', closeBottomSheet);

    // ==================== 净化引擎 - 第一版（开屏广告） ====================
    function purifyAdStage() {
      if (simulationState.isAnimating) return;
      simulationState.isAnimating = true;

      closeBottomSheet();

      // 应用净化样式
      setTimeout(() => {
        // 假按钮：透明度20% + 诱饵标签
        adElements.decoyBtn.classList.add('purified');

        // 真按钮：放大 + 亮蓝色 + AI推荐标记
        adElements.realSkipBtn.classList.add('purified');

        setShieldState('PURIFIED');
        simulationState.isAnimating = false;

        console.log('✓ 开屏广告页净化完成');
      }, 300);
    }

    // 真跳过按钮点击事件
    adElements.realSkipBtn.addEventListener('click', () => {
      if (simulationState.currentStage === 'AD_STAGE' &&
          simulationState.shieldState === 'PURIFIED') {
        // 平滑过渡到首页
        console.log('跳过广告，进入首页');
        closeBottomSheet();
        setShieldState('HIDDEN');
        switchPage('HOME_STAGE');
        // 后续阶段三会添加首页内容
      }
    });

    // 假按钮点击事件（净化后禁止点击）
    adElements.decoyBtn.addEventListener('click', () => {
      if (!adElements.decoyBtn.classList.contains('purified')) {
        console.log('用户点击了假关闭按钮（诱导下载）');
        // 在真实场景中这里会触发下载
      }
    });

    // ==================== 初始化 ====================
    function init() {
      console.log('DarkPattern Shield 初始化完成');
      updateDebugPanel();

      // 显示开屏广告页作为初始页面
      switchPage('AD_STAGE');

      // 触发开屏广告场景的悬浮盾
      triggerAdStageShield();
    }

    // 启动应用
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
